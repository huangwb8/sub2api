name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example: v1.2.8)'
        required: true
        type: string
      publish_profile:
        description: 'Publish profile for the primary release workflow'
        required: false
        type: choice
        default: dockerhub-amd64-only
        options:
          - dockerhub-amd64-only
          - dockerhub-amd64-and-ghcr-amd64

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-primary-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PROFILE: ${{ github.event.inputs.publish_profile }}
          DEFAULT_PROFILE: ${{ vars.RELEASE_PUBLISH_PROFILE }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          if [[ -z "${tag}" || "${tag}" != v* ]]; then
            echo "::error::Release workflow requires a v-prefixed tag."
            exit 1
          fi

          version="${tag#v}"
          profile="${INPUT_PROFILE:-${DEFAULT_PROFILE:-dockerhub-amd64-only}}"
          case "${profile}" in
            dockerhub-amd64-only|dockerhub-amd64-and-ghcr-amd64) ;;
            *)
              echo "Unsupported publish profile '${profile}', fallback to dockerhub-amd64-only."
              profile="dockerhub-amd64-only"
              ;;
          esac

          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/${repo_name}"

          dockerhub_image="${DOCKERHUB_REPOSITORY}"
          if [[ -z "${dockerhub_image}" && -n "${DOCKERHUB_NAMESPACE}" ]]; then
            dockerhub_image="${DOCKERHUB_NAMESPACE}/${repo_name}"
          fi
          if [[ -z "${dockerhub_image}" && -n "${DOCKERHUB_USERNAME}" ]]; then
            dockerhub_image="${DOCKERHUB_USERNAME}/${repo_name}"
          fi
          if [[ -z "${dockerhub_image}" ]]; then
            echo "::error::Docker Hub repository is not configured."
            exit 1
          fi

          stable="true"
          if [[ "${version}" == *-* ]]; then
            stable="false"
          fi

          add_tags() {
            local image="$1"
            local tags_file="$2"

            printf '%s:%s\n' "${image}" "${version}" >> "${tags_file}"
            if [[ "${stable}" == "true" ]]; then
              printf '%s:latest\n' "${image}" >> "${tags_file}"
              printf '%s:%s.%s\n' "${image}" "${version%%.*}" "$(echo "${version}" | cut -d. -f2)" >> "${tags_file}"
              printf '%s:%s\n' "${image}" "${version%%.*}" >> "${tags_file}"
            fi
          }

          dockerhub_tags_file="$(mktemp)"
          ghcr_tags_file="$(mktemp)"
          all_tags_file="$(mktemp)"
          add_tags "${dockerhub_image}" "${dockerhub_tags_file}"

          publish_ghcr="false"
          if [[ "${profile}" == "dockerhub-amd64-and-ghcr-amd64" ]]; then
            publish_ghcr="true"
            add_tags "${ghcr_image}" "${ghcr_tags_file}"
          fi

          cat "${dockerhub_tags_file}" >> "${all_tags_file}"
          if [[ "${publish_ghcr}" == "true" ]]; then
            cat "${ghcr_tags_file}" >> "${all_tags_file}"
          fi

          commit="$(git rev-parse HEAD)"
          build_date="$(git log -1 --format=%cI HEAD)"

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "profile=${profile}"
            echo "stable=${stable}"
            echo "dockerhub_image=${dockerhub_image}"
            echo "ghcr_image=${ghcr_image}"
            echo "publish_ghcr=${publish_ghcr}"
            echo "commit=${commit}"
            echo "date=${build_date}"
            echo "dockerhub_tags<<EOF"
            sort -u "${dockerhub_tags_file}"
            echo "EOF"
            echo "all_tags<<EOF"
            sort -u "${all_tags_file}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend assets
        run: pnpm run build
        working-directory: frontend

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'

      - name: Build linux/amd64 release binary
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: |
          set -euo pipefail
          pushd backend >/dev/null
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -tags embed \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE} -X main.BuildType=release" \
            -trimpath \
            -o ../sub2api \
            ./cmd/server
          popd >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: ${{ steps.meta.outputs.publish_ghcr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push primary amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.goreleaser
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.all_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64

      - name: Write workflow summary
        if: always()
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          PROFILE: ${{ steps.meta.outputs.profile }}
          DOCKERHUB_IMAGE: ${{ steps.meta.outputs.dockerhub_image }}
          DOCKERHUB_TAGS: ${{ steps.meta.outputs.dockerhub_tags }}
          GHCR_IMAGE: ${{ steps.meta.outputs.ghcr_image }}
          PUBLISH_GHCR: ${{ steps.meta.outputs.publish_ghcr }}
        run: |
          {
            echo '## Release Summary'
            echo "- Tag: \`${TAG}\`"
            echo "- Primary target: \`${DOCKERHUB_IMAGE}\`"
            echo "- Publish profile: \`${PROFILE}\`"
            echo '- Docker Hub tags:'
            while IFS= read -r tag; do
              [[ -n "${tag}" ]] || continue
              echo "  - \`${tag}\`"
            done <<< "${DOCKERHUB_TAGS}"
            if [[ "${PUBLISH_GHCR}" == "true" ]]; then
              echo "- Extra registry: \`${GHCR_IMAGE}\` (amd64)"
            else
              echo '- Extra registry: skipped'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
